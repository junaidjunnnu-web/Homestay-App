        isVeg:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - propertyId
        - name
        - category
        - price
        - isAvailable
        - isVeg
        - createdAt

    CreateMenuItemRequest:
      type: object
      properties:
        propertyId:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [breakfast, lunch, dinner, snacks, beverages]
        price:
          type: number
        isVeg:
          type: boolean
      required:
        - propertyId
        - name
        - category

    UpdateMenuItemRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [breakfast, lunch, dinner, snacks, beverages]
        price:
