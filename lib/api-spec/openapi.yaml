        mobile:
          type: string
        role:
          type: string
          enum: [manager, cleaner, cook, caretaker, receptionist, other]
        status:
          type: string
          enum: [active, inactive]
        notes:
          type: string

    # MENU SCHEMAS
    MenuItem:
      type: object
      properties:
        id:
          type: string
        propertyId:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [breakfast, lunch, dinner, snacks, beverages]
        price:
          type: number
        isAvailable:
